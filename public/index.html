<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>The Fibonacci Web</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#f2f0eb;
  --navy:#1a2340;
  --navy2:#232f55;
  --gold:#d4a82e;
  --gold2:#e8c050;
  --white:#ffffff;
  --card-border:#e4e2dc;
  --text:#1a2340;
  --text2:#5a6380;
  --shadow:0 2px 12px rgba(26,35,64,0.08), 0 1px 3px rgba(26,35,64,0.06);
  --shadow-hover:0 8px 32px rgba(26,35,64,0.14), 0 2px 8px rgba(26,35,64,0.08);
}
html,body{width:100%;height:100%;overflow:hidden;font-family:'DM Sans',sans-serif;background:var(--bg);}

/* DOT GRID */
#canvas-bg{
position:fixed;inset:0;
background-color:var(–bg);
background-image:radial-gradient(circle, #c8c5bc 1px, transparent 1px);
background-size:24px 24px;
z-index:0;
}

/* TOPBAR */
#topbar{
position:fixed;top:0;left:0;right:0;height:48px;
background:var(–navy);z-index:100;
display:flex;align-items:center;padding:0 16px;gap:12px;
box-shadow:0 1px 0 rgba(212,168,46,0.3), 0 2px 8px rgba(0,0,0,0.2);
}
.brand{
font-family:‘Cormorant Garamond’,serif;
font-size:20px;font-weight:500;
color:var(–white);letter-spacing:0.02em;
display:flex;align-items:center;gap:8px;
}
.brand-phi{color:var(–gold);font-size:22px;font-style:italic;}
.topbar-sep{width:1px;height:20px;background:rgba(255,255,255,0.15);margin:0 4px;}
.topbar-btn{
background:transparent;border:none;color:rgba(255,255,255,0.7);
font-family:‘DM Sans’,sans-serif;font-size:12px;font-weight:500;
padding:5px 10px;border-radius:5px;cursor:pointer;transition:all .15s;
display:flex;align-items:center;gap:5px;letter-spacing:0.03em;
}
.topbar-btn:hover{background:rgba(255,255,255,0.1);color:var(–white);}
.topbar-btn.active{background:rgba(212,168,46,0.2);color:var(–gold);}
.topbar-btn svg{width:14px;height:14px;}
.topbar-spacer{flex:1;}
.topbar-mode{
background:rgba(212,168,46,0.15);border:1px solid rgba(212,168,46,0.3);
color:var(–gold);font-size:11px;font-weight:600;
padding:3px 10px;border-radius:20px;letter-spacing:0.06em;
display:none;text-transform:uppercase;
}
.topbar-mode.show{display:block;}
.zoom-display{
color:rgba(255,255,255,0.4);font-size:11px;font-weight:500;
padding:4px 8px;border-radius:4px;background:rgba(255,255,255,0.05);
min-width:44px;text-align:center;letter-spacing:0.04em;
}

/* CANVAS WORLD */
#world-container{
position:fixed;top:48px;left:0;right:0;bottom:60px;
overflow:hidden;cursor:grab;z-index:1;
}
#world-container.panning{cursor:grabbing;}
#world-container.connecting{cursor:crosshair;}
#world{
position:absolute;top:0;left:0;
width:4000px;height:4000px;
transform-origin:0 0;
}
#connections-svg{
position:absolute;top:0;left:0;
width:4000px;height:4000px;
pointer-events:none;z-index:0;
overflow:visible;
}
.conn-path{
fill:none;stroke:var(–gold);stroke-width:1.5;
stroke-dasharray:4 3;opacity:0.55;
transition:opacity .2s;
}
.conn-path:hover{opacity:1;}

/* EMPTY STATE */
#empty-state{
position:absolute;top:50%;left:50%;
transform:translate(-50%,-50%);
display:flex;flex-direction:column;align-items:center;gap:18px;
pointer-events:none;z-index:2;
transition:opacity .4s;
}
#empty-state.hidden{opacity:0;pointer-events:none;}
.es-phi{
font-family:‘Cormorant Garamond’,serif;
font-size:72px;font-weight:300;font-style:italic;
color:var(–navy);opacity:0.12;
line-height:1;
}
.es-title{
font-family:‘Cormorant Garamond’,serif;
font-size:28px;font-weight:400;color:var(–navy);
letter-spacing:0.04em;opacity:0.7;
}
.es-subtitle{
font-size:13px;color:var(–text2);opacity:0.7;
letter-spacing:0.02em;
}
.es-pills{
display:flex;flex-wrap:wrap;justify-content:center;gap:8px;
max-width:500px;pointer-events:all;
}
.es-pill{
background:var(–white);border:1px solid var(–card-border);
color:var(–text2);font-size:12px;font-family:‘DM Sans’,sans-serif;
padding:6px 14px;border-radius:20px;cursor:pointer;
transition:all .2s;box-shadow:0 1px 4px rgba(26,35,64,0.06);
}
.es-pill:hover{
border-color:var(–gold);color:var(–navy);
box-shadow:0 2px 8px rgba(212,168,46,0.2);transform:translateY(-1px);
}
.es-search{
display:flex;align-items:center;gap:0;
background:var(–white);border:1.5px solid var(–card-border);
border-radius:28px;padding:0 0 0 18px;
width:420px;max-width:90vw;
box-shadow:var(–shadow);pointer-events:all;
transition:border-color .2s, box-shadow .2s;
}
.es-search:focus-within{
border-color:var(–gold);
box-shadow:0 4px 16px rgba(212,168,46,0.18);
}
.es-search input{
flex:1;border:none;outline:none;background:transparent;
font-family:‘DM Sans’,sans-serif;font-size:14px;color:var(–text);
padding:12px 0;
}
.es-search input::placeholder{color:#b0aaa0;}
.es-search-btn{
width:44px;height:44px;border-radius:50%;margin:3px;
background:var(–navy);border:none;cursor:pointer;
display:flex;align-items:center;justify-content:center;
transition:background .2s, transform .15s;flex-shrink:0;
}
.es-search-btn:hover{background:var(–gold);transform:scale(1.05);}
.es-search-btn svg{width:16px;height:16px;color:white;}

/* CARDS */
.card{
position:absolute;
background:var(–white);
border:1px solid var(–card-border);
border-radius:12px;
box-shadow:var(–shadow);
min-width:280px;
cursor:default;
transition:box-shadow .2s, border-color .2s;
z-index:10;
user-select:none;
}
.card:hover{
box-shadow:var(–shadow-hover);
z-index:20;
}
.card.selected{
border-color:var(–gold);
box-shadow:0 0 0 2px rgba(212,168,46,0.25), var(–shadow-hover);
}
.card-header{
display:flex;align-items:center;gap:8px;
padding:10px 12px 10px 14px;
border-bottom:1px solid var(–card-border);
cursor:move;
border-radius:12px 12px 0 0;
}
.card-icon{
width:22px;height:22px;border-radius:6px;
display:flex;align-items:center;justify-content:center;
font-size:11px;flex-shrink:0;
}
.card-title{
flex:1;font-size:12px;font-weight:600;color:var(–text);
letter-spacing:0.03em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.card-actions{display:flex;gap:2px;}
.card-action-btn{
width:24px;height:24px;border:none;background:transparent;
border-radius:5px;cursor:pointer;color:var(–text2);
display:flex;align-items:center;justify-content:center;
transition:all .15s;font-size:14px;
}
.card-action-btn:hover{background:var(–bg);color:var(–navy);}
.card-body{padding:14px;}

/* CHAT CARD */
.card-chat{width:320px;}
.chat-messages{
max-height:320px;overflow-y:auto;
display:flex;flex-direction:column;gap:8px;
scrollbar-width:thin;scrollbar-color:var(–card-border) transparent;
}
.chat-messages::-webkit-scrollbar{width:3px;}
.chat-messages::-webkit-scrollbar-track{background:transparent;}
.chat-messages::-webkit-scrollbar-thumb{background:var(–card-border);border-radius:2px;}
.msg{font-size:13px;line-height:1.6;color:var(–text);}
.msg-user{
background:var(–navy);color:white;
padding:8px 12px;border-radius:10px 10px 3px 10px;
font-size:12px;align-self:flex-end;max-width:90%;
}
.msg-ai{
background:var(–bg);
padding:8px 12px;border-radius:10px 10px 10px 3px;
max-width:100%;font-size:12.5px;line-height:1.65;
}
.msg-ai p{margin-bottom:6px;}
.msg-ai p:last-child{margin-bottom:0;}
.msg-ai strong{color:var(–navy);font-weight:600;}
.msg-ai ul,
.msg-ai ol{padding-left:16px;margin:4px 0;}
.msg-ai li{margin-bottom:2px;}
.msg-ai code{
font-family:monospace;font-size:11px;
background:rgba(26,35,64,0.07);
padding:1px 5px;border-radius:3px;
}
.msg-typing{
background:var(–bg);padding:10px 14px;
border-radius:10px 10px 10px 3px;
display:flex;gap:4px;align-items:center;
}
.typing-dot{
width:6px;height:6px;background:var(–text2);
border-radius:50%;animation:typing 1.2s infinite;
}
.typing-dot:nth-child(2){animation-delay:.2s;}
.typing-dot:nth-child(3){animation-delay:.4s;}
@keyframes typing{0%,60%,100%{transform:translateY(0);opacity:.4;}30%{transform:translateY(-4px);opacity:1;}}

.chat-input-row{
display:flex;gap:6px;align-items:center;
margin-top:10px;padding-top:10px;
border-top:1px solid var(–card-border);
}
.chat-input{
flex:1;border:1px solid var(–card-border);border-radius:20px;
padding:7px 12px;font-family:‘DM Sans’,sans-serif;font-size:12px;
color:var(–text);outline:none;background:var(–bg);
transition:border-color .15s;
}
.chat-input:focus{border-color:var(–gold);}
.chat-send-btn{
width:30px;height:30px;border-radius:50%;
background:var(–navy);border:none;cursor:pointer;
display:flex;align-items:center;justify-content:center;
transition:background .15s;flex-shrink:0;
}
.chat-send-btn:hover{background:var(–gold);}
.chat-send-btn svg{width:12px;height:12px;color:white;}
.chat-suggestions{
display:flex;flex-wrap:wrap;gap:5px;
margin-top:8px;
}
.chat-sugg{
background:transparent;border:1px solid var(–card-border);
color:var(–text2);font-size:10.5px;font-family:‘DM Sans’,sans-serif;
padding:3px 9px;border-radius:12px;cursor:pointer;
transition:all .15s;
}
.chat-sugg:hover{border-color:var(–gold);color:var(–navy);background:rgba(212,168,46,0.05);}

/* NOTE CARD */
.card-note{width:260px;}
.note-textarea{
width:100%;border:none;outline:none;resize:none;
font-family:‘DM Sans’,sans-serif;font-size:13px;color:var(–text);
background:transparent;line-height:1.65;min-height:100px;
cursor:text;
}

/* URL CARD */
.card-url{width:280px;}
.url-input{
width:100%;border:1px solid var(–card-border);border-radius:8px;
padding:7px 10px;font-family:‘DM Sans’,sans-serif;font-size:12px;
color:var(–text);outline:none;background:var(–bg);
transition:border-color .15s;margin-bottom:8px;
}
.url-input:focus{border-color:var(–gold);}
.url-preview{
border-radius:7px;overflow:hidden;border:1px solid var(–card-border);
font-size:12px;
}
.url-preview-img{width:100%;height:80px;object-fit:cover;background:var(–bg);}
.url-preview-body{padding:8px 10px;}
.url-preview-title{font-weight:600;font-size:12px;color:var(–text);margin-bottom:2px;}
.url-preview-domain{font-size:10.5px;color:var(–text2);}
.url-fetch-btn{
background:var(–navy);color:white;border:none;border-radius:6px;
padding:6px 12px;font-family:‘DM Sans’,sans-serif;font-size:11px;
cursor:pointer;transition:background .15s;
}
.url-fetch-btn:hover{background:var(–gold);}

/* MATRIX CARD */
.card-matrix{width:360px;}
.matrix-table{width:100%;border-collapse:collapse;font-size:11.5px;}
.matrix-table th{
background:var(–navy);color:white;
padding:6px 10px;text-align:left;font-weight:500;
font-size:10.5px;letter-spacing:0.04em;
}
.matrix-table th:first-child{border-radius:6px 0 0 0;}
.matrix-table th:last-child{border-radius:0 6px 0 0;}
.matrix-table td{
padding:7px 10px;border-bottom:1px solid var(–card-border);
color:var(–text);vertical-align:top;
}
.matrix-table tr:last-child td{border-bottom:none;}
.matrix-table tr:nth-child(even) td{background:rgba(242,240,235,0.5);}
.matrix-cell-yes{color:#2e7d32;font-weight:600;}
.matrix-cell-no{color:#c62828;}
.matrix-title{
font-family:‘Cormorant Garamond’,serif;
font-size:15px;font-weight:500;color:var(–navy);
margin-bottom:10px;
}

/* SPIDER NODES */
.spider-node{
position:absolute;
display:flex;align-items:center;justify-content:center;
border-radius:50%;cursor:move;z-index:10;
font-family:‘DM Sans’,sans-serif;font-weight:500;text-align:center;
box-shadow:var(–shadow);border:2px solid var(–card-border);
background:var(–white);color:var(–text);
transition:box-shadow .2s, border-color .2s;
user-select:none;
}
.spider-node:hover{box-shadow:var(–shadow-hover);border-color:var(–gold);}
.spider-node.main{
width:90px;height:90px;font-size:13px;font-weight:600;
border-color:var(–navy);border-width:2px;
background:var(–navy);color:white;
}
.spider-node.sub{
width:70px;height:70px;font-size:11.5px;
border-color:var(–gold);
}
.spider-node.idea{
width:54px;height:54px;font-size:10px;
background:var(–bg);
}
.node-text{padding:6px;word-break:break-word;line-height:1.3;}

/* RESEARCH CARD (long AI response) */
.card-research{width:340px;}
.research-label{
font-size:9.5px;font-weight:600;letter-spacing:0.08em;
text-transform:uppercase;color:var(–gold);margin-bottom:8px;
}
.research-content{
font-size:12.5px;line-height:1.7;color:var(–text);
max-height:280px;overflow-y:auto;
scrollbar-width:thin;scrollbar-color:var(–card-border) transparent;
}
.research-content::-webkit-scrollbar{width:3px;}
.research-content::-webkit-scrollbar-thumb{background:var(–card-border);}
.research-content p{margin-bottom:8px;}
.research-content p:last-child{margin-bottom:0;}
.research-content strong{color:var(–navy);}
.research-content h3{font-size:13px;font-weight:600;color:var(–navy);margin:10px 0 4px;}
.research-content ul{padding-left:16px;margin-bottom:6px;}
.research-content li{margin-bottom:2px;}
.research-content code{font-size:11px;background:rgba(26,35,64,0.07);padding:1px 4px;border-radius:3px;}

/* BOTTOM TOOLBAR */
#toolbar{
position:fixed;bottom:12px;left:50%;transform:translateX(-50%);
background:var(–navy);border-radius:28px;
padding:6px 10px;
display:flex;align-items:center;gap:2px;
box-shadow:0 4px 24px rgba(26,35,64,0.3), 0 1px 0 rgba(255,255,255,0.06) inset;
z-index:100;
}
.tb-sep{width:1px;height:20px;background:rgba(255,255,255,0.12);margin:0 3px;}
.tb-btn{
width:36px;height:36px;border:none;background:transparent;
border-radius:20px;cursor:pointer;
display:flex;align-items:center;justify-content:center;
color:rgba(255,255,255,0.65);transition:all .15s;
position:relative;
}
.tb-btn:hover{background:rgba(255,255,255,0.1);color:white;}
.tb-btn.active{background:rgba(212,168,46,0.2);color:var(–gold);}
.tb-btn svg{width:16px;height:16px;}
.tb-tooltip{
position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);
background:rgba(26,35,64,0.95);color:white;font-size:10px;font-weight:500;
padding:3px 8px;border-radius:5px;white-space:nowrap;pointer-events:none;
opacity:0;transition:opacity .15s;letter-spacing:0.03em;
}
.tb-btn:hover .tb-tooltip{opacity:1;}

/* CONTEXT MENU */
#ctx-menu{
position:fixed;z-index:200;
background:var(–white);border:1px solid var(–card-border);
border-radius:10px;box-shadow:0 8px 32px rgba(26,35,64,0.15);
padding:5px;min-width:160px;display:none;
}
.ctx-item{
display:flex;align-items:center;gap:8px;
padding:7px 10px;border-radius:6px;cursor:pointer;
font-size:12px;color:var(–text);transition:background .12s;
}
.ctx-item:hover{background:var(–bg);}
.ctx-item svg{width:13px;height:13px;color:var(–text2);}
.ctx-item.danger{color:#c62828;}
.ctx-item.danger svg{color:#c62828;}
.ctx-sep{height:1px;background:var(–card-border);margin:3px 0;}

/* CARD COLOR VARIANTS */
.card-header.yellow{background:rgba(212,168,46,0.08);}
.card-header.blue{background:rgba(26,35,64,0.04);}
.card-header.green{background:rgba(46,125,50,0.06);}

/* CONNECT MODE HIGHLIGHT */
.connect-source{border-color:var(–gold)!important;box-shadow:0 0 0 3px rgba(212,168,46,0.3)!important;}

/* RESIZE HANDLE */
.resize-handle{
position:absolute;bottom:4px;right:4px;
width:12px;height:12px;cursor:se-resize;
opacity:0.3;
}
.resize-handle:hover{opacity:0.7;}

/* SEARCH OVERLAY */
#search-overlay{
display:none;
position:fixed;top:60px;left:50%;transform:translateX(-50%);
background:var(–white);border:1px solid var(–card-border);
border-radius:12px;box-shadow:var(–shadow-hover);
padding:12px;min-width:300px;z-index:150;
}
#search-overlay.show{display:block;}
#search-overlay input{
width:100%;border:1px solid var(–card-border);border-radius:8px;
padding:8px 12px;font-family:‘DM Sans’,sans-serif;font-size:13px;
outline:none;color:var(–text);
}

/* TOAST */
#toast{
position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
background:var(–navy);color:white;
font-size:12px;padding:8px 16px;border-radius:20px;
z-index:300;opacity:0;transition:opacity .3s;pointer-events:none;
white-space:nowrap;
}
#toast.show{opacity:1;}

/* CARD ENTRY ANIMATION */
@keyframes card-enter{
from{opacity:0;transform:scale(0.92) translateY(8px);}
to{opacity:1;transform:scale(1) translateY(0);}
}
.card-entering{animation:card-enter .25s cubic-bezier(0.34,1.56,0.64,1) forwards;}

/* SCROLLBAR GLOBAL */
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(–card-border);border-radius:3px;}

</style>
</head>
<body>

<div id="canvas-bg"></div>

<!-- TOPBAR -->

<div id="topbar">
  <div class="brand">
    <span class="brand-phi">φ</span>
    <span>The Fibonacci Web</span>
  </div>
  <div class="topbar-sep"></div>
  <button class="topbar-btn" onclick="saveCanvas()">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M13 13H3a1 1 0 01-1-1V4l3-3h8a1 1 0 011 1v10a1 1 0 01-1 1zM5 1v4h6M5 9h6"/></svg>
    Save
  </button>
  <button class="topbar-btn" onclick="loadCanvas()">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 4h12v9a1 1 0 01-1 1H3a1 1 0 01-1-1V4zM5 4V2h6v2"/></svg>
    Load
  </button>
  <button class="topbar-btn" onclick="clearCanvas()">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 2l12 12M14 2L2 14"/></svg>
    Clear
  </button>
  <div class="topbar-spacer"></div>
  <div class="topbar-mode" id="mode-label"></div>
  <div class="zoom-display" id="zoom-display">100%</div>
</div>

<!-- WORLD CANVAS -->

<div id="world-container" 
  onpointerdown="handleWorldPointerDown(event)"
  onpointermove="handleWorldPointerMove(event)"
  onpointerup="handleWorldPointerUp(event)"
  onwheel="handleWheel(event)"
  oncontextmenu="handleContextMenu(event)">
  <svg id="connections-svg"></svg>
  <div id="world">
    <!-- EMPTY STATE -->
    <div id="empty-state" style="top:50%;left:50%;transform:translate(-50%,-50%)">
      <div class="es-phi">φ</div>
      <div class="es-title">The Fibonacci Web</div>
      <div class="es-subtitle">Your infinite research canvas</div>
      <div class="es-pills">
        <button class="es-pill" onclick="quickSearch('Explain quantum entanglement')">Quantum entanglement</button>
        <button class="es-pill" onclick="quickSearch('What is the Fibonacci sequence in nature?')">Fibonacci in nature</button>
        <button class="es-pill" onclick="quickSearch('Compare machine learning frameworks')">ML frameworks</button>
        <button class="es-pill" onclick="quickSearch('History of the Roman Empire')">Roman Empire</button>
        <button class="es-pill" onclick="quickSearch('How does CRISPR gene editing work?')">CRISPR explained</button>
      </div>
      <div class="es-search">
        <input type="text" id="es-input" placeholder="Ask anything or start a research thread…" 
          onkeydown="if(event.key==='Enter')esSearch()"/>
        <button class="es-search-btn" onclick="esSearch()">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 8h10M9 4l4 4-4 4"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>

<!-- BOTTOM TOOLBAR -->

<script>
// ─── STATE ───────────────────────────────────────────────────────────────────
const state = {
  mode: 'select',   // pan | select | connect | delete
  cards: {},        // id → {el, data}
  connections: [],  // [{from,to,el}]
  selected: new Set(),
  connectSource: null,
  cardCount: 0,
  zoom: 1,
  panX: 0,
  panY: 0,
  isPanning: false,
  panStart: null,
  dragging: null,    // {id, startX, startY, origX, origY}
  ctxPos: {x:0,y:0},
};

const world = document.getElementById('world');
const container = document.getElementById('world-container');
const svg = document.getElementById('connections-svg');
const emptyState = document.getElementById('empty-state');

// ─── INIT ─────────────────────────────────────────────────────────────────────
function init() {
  // start centered
  const cx = window.innerWidth/2 - 2000;
  const cy = (window.innerHeight-108)/2 - 2000;
  state.panX = cx; state.panY = cy;
  applyTransform();
  setMode('select');
}

// ─── TRANSFORM ───────────────────────────────────────────────────────────────
function applyTransform() {
  world.style.transform = `translate(${state.panX}px,${state.panY}px) scale(${state.zoom})`;
  svg.style.transform = `translate(${state.panX}px,${state.panY}px) scale(${state.zoom})`;
  document.getElementById('zoom-display').textContent = Math.round(state.zoom*100)+'%';
}

function zoomIn() { setZoom(state.zoom * 1.2); }
function zoomOut() { setZoom(state.zoom / 1.2); }
function resetView() {
  state.zoom = 1;
  const cx = window.innerWidth/2 - 2000;
  const cy = (window.innerHeight-108)/2 - 2000;
  state.panX = cx; state.panY = cy;
  applyTransform();
}
function setZoom(z) {
  state.zoom = Math.min(3, Math.max(0.2, z));
  applyTransform();
}

// ─── MODE ────────────────────────────────────────────────────────────────────
function setMode(m) {
  state.mode = m;
  state.connectSource = null;
  document.querySelectorAll('.tb-btn[id^=btn-]').forEach(b=>b.classList.remove('active'));
  const btn = document.getElementById('btn-'+m);
  if(btn) btn.classList.add('active');
  const label = document.getElementById('mode-label');
  const names = {pan:'Pan Mode',select:'',connect:'Connect Mode',delete:'Delete Mode'};
  label.textContent = names[m]||'';
  label.classList.toggle('show', !!names[m]);
  container.classList.toggle('connecting', m==='connect');
  // clear connect highlights
  document.querySelectorAll('.connect-source').forEach(e=>e.classList.remove('connect-source'));
}

// ─── POINTER EVENTS (PAN + DRAG) ─────────────────────────────────────────────
function screenToWorld(sx, sy) {
  const rect = container.getBoundingClientRect();
  return {
    x: (sx - rect.left - state.panX) / state.zoom,
    y: (sy - rect.top - state.panY) / state.zoom
  };
}

function handleWorldPointerDown(e) {
  if(e.target === container || e.target === world || e.target === svg || e.target === emptyState) {
    if(state.mode === 'select' || state.mode === 'pan') {
      state.isPanning = true;
      state.panStart = {x: e.clientX - state.panX, y: e.clientY - state.panY};
      container.setPointerCapture(e.pointerId);
    }
    hideCtxMenu();
    clearSelection();
  }
}
function handleWorldPointerMove(e) {
  if(state.isPanning && state.panStart) {
    state.panX = e.clientX - state.panStart.x;
    state.panY = e.clientY - state.panStart.y;
    applyTransform();
    updateAllConnections();
  }
  if(state.dragging) {
    const d = state.dragging;
    const dx = (e.clientX - d.startX) / state.zoom;
    const dy = (e.clientY - d.startY) / state.zoom;
    const el = document.getElementById(d.id);
    if(el){
      el.style.left = (d.origX + dx)+'px';
      el.style.top  = (d.origY + dy)+'px';
      updateAllConnections();
    }
  }
}
function handleWorldPointerUp(e) {
  state.isPanning = false;
  state.panStart = null;
  if(state.dragging) {
    const d = state.dragging;
    const el = document.getElementById(d.id);
    if(el && state.cards[d.id]) {
      state.cards[d.id].x = parseInt(el.style.left);
      state.cards[d.id].y = parseInt(el.style.top);
    }
    state.dragging = null;
    el && el.releasePointerCapture && el.releasePointerCapture(e.pointerId);
  }
}
function handleWheel(e) {
  e.preventDefault();
  const rect = container.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const factor = e.deltaY < 0 ? 1.1 : 0.9;
  const newZoom = Math.min(3, Math.max(0.2, state.zoom * factor));
  state.panX = mx - (mx - state.panX) * (newZoom/state.zoom);
  state.panY = my - (my - state.panY) * (newZoom/state.zoom);
  state.zoom = newZoom;
  applyTransform();
  updateAllConnections();
}

// ─── CARD DRAGGING ───────────────────────────────────────────────────────────
function initCardDrag(el, id) {
  el.addEventListener('pointerdown', (e) => {
    if(state.mode === 'delete') { deleteCard(id); return; }
    if(state.mode === 'connect') { handleConnectClick(id); return; }
    const header = e.target.closest('.card-header, .spider-node');
    if(!header) return;
    e.stopPropagation();
    e.preventDefault();
    state.dragging = {
      id, startX: e.clientX, startY: e.clientY,
      origX: parseInt(el.style.left), origY: parseInt(el.style.top)
    };
    el.setPointerCapture(e.pointerId);
    selectCard(id);
  });
}

// ─── SELECTION ───────────────────────────────────────────────────────────────
function selectCard(id) {
  clearSelection();
  state.selected.add(id);
  document.getElementById(id)?.classList.add('selected');
}
function clearSelection() {
  state.selected.forEach(id => document.getElementById(id)?.classList.remove('selected'));
  state.selected.clear();
}

// ─── CONNECT MODE ────────────────────────────────────────────────────────────
function handleConnectClick(id) {
  if(!state.connectSource) {
    state.connectSource = id;
    document.getElementById(id)?.classList.add('connect-source');
  } else if(state.connectSource !== id) {
    addConnection(state.connectSource, id);
    document.getElementById(state.connectSource)?.classList.remove('connect-source');
    state.connectSource = null;
    setMode('select');
  }
}
function addConnection(fromId, toId) {
  const existing = state.connections.find(c=>(c.from===fromId&&c.to===toId)||(c.from===toId&&c.to===fromId));
  if(existing) return;
  const path = document.createElementNS('http://www.w3.org/2000/svg','path');
  path.classList.add('conn-path');
  svg.appendChild(path);
  const conn = {from:fromId, to:toId, el:path};
  state.connections.push(conn);
  updateConnection(conn);
}
function updateConnection(conn) {
  const fromEl = document.getElementById(conn.from);
  const toEl = document.getElementById(conn.to);
  if(!fromEl||!toEl) return;
  const fx = parseInt(fromEl.style.left) + fromEl.offsetWidth/2;
  const fy = parseInt(fromEl.style.top)  + fromEl.offsetHeight/2;
  const tx = parseInt(toEl.style.left)   + toEl.offsetWidth/2;
  const ty = parseInt(toEl.style.top)    + toEl.offsetHeight/2;
  const cx = (fx+tx)/2, cy1 = fy, cy2 = ty;
  conn.el.setAttribute('d', `M${fx},${fy} C${cx},${cy1} ${cx},${cy2} ${tx},${ty}`);
}
function updateAllConnections() {
  state.connections.forEach(updateConnection);
}

// ─── CARD CREATION UTILITIES ─────────────────────────────────────────────────
function newId() { return 'card-'+(++state.cardCount)+'-'+Date.now(); }
function centerPos() {
  const rect = container.getBoundingClientRect();
  const cx = (rect.width/2 - state.panX) / state.zoom;
  const cy = (rect.height/2 - state.panY) / state.zoom;
  return {x: cx - 160 + Math.random()*80-40, y: cy - 100 + Math.random()*80-40};
}
function placeCard(el, x, y) {
  el.style.left = x+'px'; el.style.top = y+'px';
}
function registerCard(id, el, data) {
  state.cards[id] = {...data, x: parseInt(el.style.left), y: parseInt(el.style.top)};
  world.appendChild(el);
  el.classList.add('card-entering');
  setTimeout(()=>el.classList.remove('card-entering'), 300);
  initCardDrag(el, id);
  hideEmptyState();
}
function hideEmptyState() {
  document.getElementById('empty-state').classList.add('hidden');
}
function cardActionsHTML(id) {
  return `<div class="card-actions">
    <button class="card-action-btn" onclick="connectFromCard('${id}')" title="Connect">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M5 8h6M9 6l2 2-2 2"/></svg>
    </button>
    <button class="card-action-btn" onclick="deleteCard('${id}')" title="Delete">✕</button>
  </div>`;
}
function connectFromCard(id) { setMode('connect'); handleConnectClick(id); }

// ─── CHAT CARD ────────────────────────────────────────────────────────────────
function addChatCard(initialMsg) {
  const id = newId();
  const pos = centerPos();
  const el = document.createElement('div');
  el.id = id; el.className = 'card card-chat';
  placeCard(el, pos.x, pos.y);
  el.innerHTML = `
    <div class="card-header yellow">
      <div class="card-icon" style="background:rgba(212,168,46,0.15);color:var(--gold)">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 3h12v8H9l-3 3v-3H2V3z"/></svg>
      </div>
      <div class="card-title">Research Chat</div>
      ${cardActionsHTML(id)}
    </div>
    <div class="card-body">
      <div class="chat-messages" id="msgs-${id}"></div>
      <div class="chat-suggestions" id="sugg-${id}"></div>
      <div class="chat-input-row">
        <input class="chat-input" id="input-${id}" placeholder="Ask something…" 
          onkeydown="if(event.key==='Enter')sendChat('${id}')"/>
        <button class="chat-send-btn" onclick="sendChat('${id}')">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 8h10M9 4l4 4-4 4"/></svg>
        </button>
      </div>
    </div>`;
  registerCard(id, el, {type:'chat', messages:[]});
  if(initialMsg) sendChat(id, initialMsg);
  return id;
}

function sendChat(cardId, msg) {
  const input = document.getElementById('input-'+cardId);
  const text = msg || (input && input.value.trim());
  if(!text) return;
  if(input) input.value = '';
  
  const messagesEl = document.getElementById('msgs-'+cardId);
  const suggEl = document.getElementById('sugg-'+cardId);
  if(!messagesEl) return;

  // Update state
  if(!state.cards[cardId]) return;
  state.cards[cardId].messages = state.cards[cardId].messages || [];
  state.cards[cardId].messages.push({role:'user', content:text});

  // Render user msg
  appendMessage(messagesEl, 'user', text);

  // Typing indicator
  const typingEl = document.createElement('div');
  typingEl.className = 'msg-typing';
  typingEl.innerHTML = `<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>`;
  messagesEl.appendChild(typingEl);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  if(suggEl) suggEl.innerHTML = '';

  callAI(state.cards[cardId].messages).then(reply => {
    typingEl.remove();
    state.cards[cardId].messages.push({role:'assistant', content:reply});
    
    // Check if matrix JSON
    const trimmed = reply.trim();
    if(trimmed.startsWith('{') && trimmed.includes('"type":"matrix"')) {
      try {
        const mat = JSON.parse(trimmed);
        if(mat.type === 'matrix') {
          appendMessage(messagesEl, 'ai', '📊 Matrix created — see connected card.');
          messagesEl.scrollTop = messagesEl.scrollHeight;
          const matId = addMatrixCardFromData(mat);
          const cPos = centerPos();
          const el2 = document.getElementById(matId);
          if(el2) {
            const cardEl = document.getElementById(cardId);
            const cx2 = parseInt(cardEl.style.left) + 360;
            const cy2 = parseInt(cardEl.style.top);
            el2.style.left = cx2+'px'; el2.style.top = cy2+'px';
          }
          addConnection(cardId, matId);
          updateAllConnections();
          setSuggestions(suggEl, cardId, ['More details?','Show another format','Explain the criteria']);
          return;
        }
      } catch(e){}
    }

    // Long response → spawn research card
    if(reply.length > 600) {
      const shortReply = reply.substring(0,200)+'…';
      appendMessage(messagesEl, 'ai', shortReply);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      const resId = addResearchCard(reply, text);
      const cardEl = document.getElementById(cardId);
      const resEl = document.getElementById(resId);
      if(resEl && cardEl) {
        resEl.style.left = (parseInt(cardEl.style.left)+360)+'px';
        resEl.style.top  = (parseInt(cardEl.style.top))+'px';
      }
      addConnection(cardId, resId);
      updateAllConnections();
    } else {
      appendMessage(messagesEl, 'ai', reply);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }
    setSuggestions(suggEl, cardId, generateSuggestions(text, reply));
  }).catch(err => {
    typingEl.remove();
    appendMessage(messagesEl, 'ai', '⚠️ Error: '+err.message);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  });
}

function appendMessage(container, role, text) {
  const el = document.createElement('div');
  if(role === 'user') {
    el.className = 'msg msg-user';
    el.textContent = text;
  } else {
    el.className = 'msg msg-ai';
    el.innerHTML = formatMarkdown(text);
  }
  container.appendChild(el);
}

function formatMarkdown(text) {
  return text
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/`(.+?)`/g,'<code>$1</code>')
    .replace(/^#{1,3}\s+(.+)$/gm,'<h3>$1</h3>')
    .replace(/^[-•]\s+(.+)$/gm,'<li>$1</li>')
    .replace(/(<li>.*<\/li>\n?)+/g, m=>`<ul>${m}</ul>`)
    .replace(/\n\n+/g,'</p><p>')
    .replace(/^(?!<[hul])/m, '<p>')
    .replace(/(?<![>])$/m, '</p>')
    .replace(/<p><\/p>/g,'')
    .replace(/<p>(<[hul])/g,'$1')
    .replace(/(<\/[hul][^>]*>)<\/p>/g,'$1');
}

function setSuggestions(el, cardId, suggestions) {
  el.innerHTML = suggestions.map(s=>`
    <button class="chat-sugg" onclick="sendChat('${cardId}','${s.replace(/'/g,"\\'")}')">
      ${s}
    </button>`).join('');
}

function generateSuggestions(question, answer) {
  const base = [
    'Tell me more',
    'Give me an example',
    'Summarize this',
    'What are the key points?',
    'How does this relate to modern research?',
    'Compare with alternatives',
    'What are the limitations?',
    'Create a matrix comparison'
  ];
  return base.sort(()=>Math.random()-.5).slice(0,3);
}

function fetchUrl(cardId) {
const input = document.getElementById(‘url-’+cardId);
const url = input?.value.trim();
if(!url) return;
const preview = document.getElementById(‘url-preview-’+cardId);
if(!preview) return;
preview.innerHTML = `<div style="font-size:11px;color:var(--text2);padding:8px 0">Analyzing URL with AI…</div>`;
const domain = (() => { try { return new URL(url).hostname; } catch(e){ return url; } })();
callAI([{role:‘user’, content:`Summarize what the website at this URL likely contains and what it's about. URL: ${url}\n\nProvide: 1) A likely page title 2) A 2-sentence summary of what this resource contains. Format: Title: ...\nSummary: ...`}])
.then(reply => {
const titleMatch = reply.match(/Title:\s*(.+)/i);
const summaryMatch = reply.match(/Summary:\s*([\s\S]+)/i);
const title = titleMatch ? titleMatch[1].trim() : domain;
const summary = summaryMatch ? summaryMatch[1].trim() : reply;
preview.innerHTML = ` <div class="url-preview"> <div class="url-preview-body"> <div class="url-preview-title">${title}</div> <div class="url-preview-domain">🔗 ${domain}</div> <div style="font-size:11.5px;color:var(--text2);margin-top:6px;line-height:1.5">${summary.substring(0,180)}</div> </div> </div>`;
if(state.cards[cardId]) state.cards[cardId].url = url;
}).catch(()=>{
preview.innerHTML = `<div class="url-preview"> <div class="url-preview-body"> <div class="url-preview-title">${domain}</div> <div style="font-size:11px;color:var(--text2)">Could not analyze URL.</div> </div> </div>`;
});
}

function addMatrixCard() {

function addMatrixCardFromData(mat) {
const id = newId();
const pos = centerPos();
const el = document.createElement(‘div’);
el.id = id; el.className = ‘card card-matrix’;
placeCard(el, pos.x, pos.y);
const cols = mat.cols || [];
const rows = mat.rows || [];
const headers = [’’, …cols].map(c=>`<th>${c}</th>`).join(’’);
const rowsHTML = rows.map(r => {
const cells = (r.values||[]).map(v=>{
const vl = String(v).toLowerCase();
const cls = vl===‘yes’||vl===‘✓’||vl===‘true’ ? ’ class=“matrix-cell-yes”’ : vl===‘no’||vl===‘✗’||vl===‘false’ ? ’ class=“matrix-cell-no”’ : ‘’;
return `<td${cls}>${v}</td>`;
}).join(’’);
return `<tr><td><strong>${r.label||''}</strong></td>${cells}</tr>`;
}).join(’’);
el.innerHTML = ` <div class="card-header"> <div class="card-icon" style="background:rgba(26,35,64,0.07);color:var(--navy)"> <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="12" height="12" rx="1"/><path d="M2 6h12M2 10h12M6 2v12"/></svg> </div> <div class="card-title">${mat.title||'Matrix'}</div> ${cardActionsHTML(id)} </div> <div class="card-body" style="padding:10px;overflow-x:auto"> <div class="matrix-title">${mat.title||''}</div> <table class="matrix-table"> <thead><tr>${headers}</tr></thead> <tbody>${rowsHTML}</tbody> </table> </div>`;

return id;
}

// ─── DELETE ───────────────────────────────────────────────────────────────────
function deleteCard(id) {
const el = document.getElementById(id);
if(el) {
el.style.transition = ‘opacity .15s, transform .15s’;

return true;
});

}
}

// ─── AI API ───────────────────────────────────────────────────────────────────
async function callAI(messages, system) {
const response = await fetch(’/api/claude’, {
method:‘POST’,
headers:{‘Content-Type’:‘application/json’},
body: JSON.stringify({messages, system})
});
if(!response.ok) {
const err = await response.text();
throw new Error(’API error: ’+err);
}
const data = await response.json();
return data.content?.[0]?.text || ‘’;
}

// ─── TOAST ───────────────────────────────────────────────────────────────────
function showToast(msg) {
const t = document.getElementById(‘toast’);
t.textContent = msg;
t.classList.add(‘show’);
setTimeout(()=>t.classList.remove(‘show’), 2200);
}

// ─── KEYBOARD SHORTCUTS ───────────────────────────────────────────────────────
document.addEventListener(‘keydown’, e => {
if(e.target.tagName===‘INPUT’||e.target.tagName===‘TEXTAREA’||e.target.isContentEditable) return;
if(e.key===‘Delete’||e.key===‘Backspace’) {
[…state.selected].forEach(id=>deleteCard(id));
}
if(e.key===‘Escape’) { setMode(‘select’); clearSelection(); }
if(e.key===‘s’&&(e.metaKey||e.ctrlKey)) { e.preventDefault(); saveCanvas(); }
if(e.key===’=’||e.key===’+’) zoomIn();
if(e.key===’-’) zoomOut();
if(e.key===‘0’) resetView();
if(e.key===‘c’&&!e.metaKey&&!e.ctrlKey) setMode(‘connect’);
if(e.key===‘n’) addNoteCard();
});

// TOUCH pinch zoom
let lastTouchDist = null;
container.addEventListener(‘touchstart’, e => {
if(e.touches.length===2) {
lastTouchDist = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
}
});
container.addEventListener(‘touchmove’, e => {
if(e.touches.length===2 && lastTouchDist) {
e.preventDefault();
const dist = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
setZoom(state.zoom * dist/lastTouchDist);
lastTouchDist = dist;
}
}, {passive:false});
container.addEventListener(‘touchend’, ()=>{ lastTouchDist = null; });
